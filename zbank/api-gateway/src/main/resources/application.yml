server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ── Auth routes (no JWT check) ──────────────────────────────
        - id: auth-register
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/register
          filters:
            - name: AuthFilter
              args:
                secured: false

        - id: auth-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/login
          filters:
            - name: AuthFilter
              args:
                secured: false

        # ── Protected routes ────────────────────────────────────────
        - id: card-application
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/applications/**
          filters:
            - name: AuthFilter
              args:
                secured: true

        - id: credit-score
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/credit-score/**
          filters:
            - name: AuthFilter
              args:
                secured: true

        - id: card-pin
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/cards/**
          filters:
            - name: AuthFilter
              args:
                secured: true

# Auth Service URL — used by the JWT validation filter
app:
  auth-service-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health, info
